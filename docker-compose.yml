services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: la_dehesa
      DB_USER: root
      DB_PASS: rootpassword
      MAIL_USER: adminladehesa@gmail.com
      MAIL_PASS: nxvn biql xcue pdgz
      MAIL_ADMIN: adminladehesa@gmail.com
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: la_dehesa
    volumes:
      - ./crm/database/BBDD.sql:/docker-entrypoint-initdb.d/BBDD.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
